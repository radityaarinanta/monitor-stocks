<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHSG Stock Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .container { margin-top: 50px; }
        .card { background-color: #1e1e1e; border: none; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="mb-4">📈 Monitoring Saham IHSG</h1>
        
        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <form action="/" method="get" class="input-group">
                    <input type="text" name="ticker" class="form-control" placeholder="Masukkan kode (Contoh: TLKM, ASII, BBRI)" aria-label="Ticker">
                    <button class="btn btn-primary" type="submit">Cek Saham</button>
                </form>
                <p class="mt-2 text-muted">Menampilkan data untuk: <strong>{{ ticker }}</strong></p>
            </div>
        </div>

        <div class="card p-3 shadow">
            {{ plot | safe }}
        </div>
        
        <footer class="mt-5 text-muted small">
            Dibuat untuk projek gabut-gabutan menggunakan Python & Flask
        </footer>
    </div>
</body>
</html>
